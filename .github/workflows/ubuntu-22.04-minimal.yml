name: ubuntu-22.04-minimal

on:
  push:
    paths-ignore:
      - .github/workflows/*.yml
      - images/*.cmd
      - README.md
      - LICENSE

jobs:
  ubuntu-2204-minimal:
    uses: ./.github/workflows/.ubuntu.yml
    with:
      ubuntu-version: 22.04
      arm64: false
      minimal: true
      slim: false
      instance: m8id.large:ubuntu-24.04-minimal
