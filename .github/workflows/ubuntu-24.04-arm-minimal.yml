name: ubuntu-24.04-arm-minimal

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - .github/workflows/*.yml
      - images/Dockerfile-ubuntu-22.04
      - images/ubuntu-22.04/*.sh
      - images/*.cmd
      - README.md
      - LICENSE

jobs:
  ubuntu-2404-arm-minimal:
    uses: ./.github/workflows/.ubuntu.yml
    with:
      ubuntu-version: 24.04
      arm64: true
      minimal: true
      slim: false
      instance: r7gd.large:ubuntu-24.04-arm-minimal:ap-south-1
